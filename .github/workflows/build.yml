# ============================================================
# .github/workflows/build.yml
# Builds WLED Word Clock firmware for all four environments.
#
# How it works:
#   1. Clones WLED from github.com/wled/WLED at a pinned tag
#   2. Injects our usermod files into the WLED source tree
#   3. Applies platformio_override.ini to add our build envs
#   4. Compiles using WLED's own PlatformIO setup
#
# WLED_TAG must include the "v" prefix — e.g. "v0.15.3"
# The repo moved from Aircoookie/WLED to wled/WLED in 2024.
# ============================================================
name: Build Firmware

on:
  push:
    branches: ["main"]
    tags:     ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

env:
  WLED_REPO: "wled/WLED"
  WLED_TAG:  "v0.15.3"

jobs:
  build:
    name: Build – ${{ matrix.env }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - env: wordclock_esp32c3
            artifact: wordclock-esp32c3
          - env: wordclock_esp8266
            artifact: wordclock-esp8266
          - env: wordclock8x8_esp32c3
            artifact: wordclock8x8-esp32c3
          - env: wordclock8x8_esp8266
            artifact: wordclock8x8-esp8266

    steps:
      - name: Checkout Word Clock repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone WLED ${{ env.WLED_TAG }}
        run: |
          git clone --depth 1 \
            --branch "${{ env.WLED_TAG }}" \
            "https://github.com/${{ env.WLED_REPO }}.git" \
            wled-src
          echo "Cloned ${{ env.WLED_REPO }} at ${{ env.WLED_TAG }}"

      - name: Inject Word Clock files into WLED source
        run: |
          cp -r usermods/WordClock     wled-src/usermods/
          cp -r usermods/WordClock8x8  wled-src/usermods/
          cp wled00/usermods_list.cpp  wled-src/wled00/usermods_list.cpp
          printf '\n// Word Clock usermods\n'                         >> wled-src/wled00/const.h
          printf '#ifndef USERMOD_ID_WORDCLOCK\n'                     >> wled-src/wled00/const.h
          printf '#define USERMOD_ID_WORDCLOCK 99\n#endif\n'          >> wled-src/wled00/const.h
          printf '#ifndef USERMOD_ID_WORDCLOCK_8X8\n'                 >> wled-src/wled00/const.h
          printf '#define USERMOD_ID_WORDCLOCK_8X8 98\n#endif\n'      >> wled-src/wled00/const.h
          echo "Injected. Tail of const.h:"; tail -7 wled-src/wled00/const.h

      - name: Copy platformio_override.ini into WLED root
        run: cp platformio_override.ini wled-src/platformio_override.ini

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ env.WLED_TAG }}-${{ matrix.env }}-${{ hashFiles('wled-src/platformio.ini') }}
          restore-keys: |
            pio-${{ env.WLED_TAG }}-${{ matrix.env }}-
            pio-${{ env.WLED_TAG }}-

      - name: Build ${{ matrix.env }}
        working-directory: wled-src
        run: pio run --environment "${{ matrix.env }}"

      - name: Find compiled .bin
        id: find_bin
        working-directory: wled-src
        run: |
          BIN=$(find .pio/build/${{ matrix.env }} -maxdepth 1 -name "*.bin" | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: no .bin found"; ls .pio/build/${{ matrix.env }}/ || true; exit 1
          fi
          echo "bin_path=$BIN" >> "$GITHUB_OUTPUT"
          echo "Found: $BIN"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wled-src/${{ steps.find_bin.outputs.bin_path }}
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Get tag / version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "Word Clock Firmware ${{ steps.version.outputs.tag }}"
          draft:      false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            ## WLED Word Clock Firmware
            Built on WLED ${{ env.WLED_TAG }}

            | File | Clock | Board |
            |------|-------|-------|
            | `wordclock-esp32c3.bin`    | 11×10 matrix | ESP32-C3 SuperMini |
            | `wordclock-esp8266.bin`    | 11×10 matrix | ESP8266 D1 Mini    |
            | `wordclock8x8-esp32c3.bin` |  8×8  matrix | ESP32-C3 SuperMini |
            | `wordclock8x8-esp8266.bin` |  8×8  matrix | ESP8266 D1 Mini    |

            ### After flashing
            1. Connect to **WLED-AP** hotspot → enter your WiFi password
            2. Open `http://wled.local` → **Config → LED Preferences** → set LED count
               - 11×10 clock: **114**  |  8×8 clock: **64**
            3. **Config → Time & Macros** → enable NTP, set your UTC offset
            4. **Config → Usermods → wc** (11×10) or **wc8** (8×8) → configure colours
          files: release/*.bin
