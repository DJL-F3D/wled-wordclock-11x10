; ============================================================
; platformio_override.ini — Word Clock build environments
;
; This file is copied into the WLED source root by build.yml.
; WLED picks it up automatically alongside its own platformio.ini.
;
; Four environments — build the one that matches your hardware:
;
;   wordclock_esp32c3     11×10 clock on ESP32-C3 SuperMini
;   wordclock_esp8266     11×10 clock on ESP8266 D1 Mini
;   wordclock8x8_esp32c3   8×8  clock on ESP32-C3 SuperMini
;   wordclock8x8_esp8266   8×8  clock on ESP8266 D1 Mini
;
; DATA_PINS — change to match your wiring:
;   ESP32-C3 default : 8  (GPIO8 on SuperMini)
;   ESP8266  default : 2  (GPIO2 = D4 on D1 Mini)
; ============================================================

[platformio]
default_envs =
  wordclock_esp32c3
  wordclock_esp8266
  wordclock8x8_esp32c3
  wordclock8x8_esp8266

; ════════════════════════════════════════════════════════════
; 11×10 WORD CLOCK
; ════════════════════════════════════════════════════════════

; ── 11×10 — ESP32-C3 SuperMini ───────────────────────────────────────────────
; SuperMini-specific notes vs generic DevKitM-1:
;   board = lolin_c3_mini     → correct DIO flash mode (QIO causes blank boot)
;   ARDUINO_USB_CDC_ON_BOOT=0 → don't wait for USB host; boots standalone
;   ARDUINO_USB_MODE=1        → JTAG/Serial mode for SuperMini native USB
[env:wordclock_esp32c3]
extends           = esp32c3
platform          = ${esp32c3.platform}
platform_packages = ${esp32c3.platform_packages}
board             = lolin_c3_mini
board_build.flash_mode  = dio
board_build.partitions  = min_spiffs.csv
build_unflags     = ${common.build_unflags}
  -D ARDUINO_USB_CDC_ON_BOOT=1
build_flags       = ${common.build_flags} ${esp32c3.build_flags}
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MODE=1
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PINS=8

; ── 11×10 — ESP8266 D1 Mini ──────────────────────────────────────────────────
[env:wordclock_esp8266]
board             = d1_mini
platform          = ${common.platform_wled_default}
platform_packages = ${common.platform_packages}
board_build.ldscript = ${common.ldscript_4m1m}
build_unflags     = ${common.build_unflags}
build_flags       = ${common.build_flags} ${esp8266.build_flags}
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PINS=2
lib_deps          = ${esp8266.lib_deps}

; ════════════════════════════════════════════════════════════
; 8×8 WORD CLOCK
; ════════════════════════════════════════════════════════════

; ── 8×8 — ESP32-C3 SuperMini ─────────────────────────────────────────────────
[env:wordclock8x8_esp32c3]
extends           = esp32c3
platform          = ${esp32c3.platform}
platform_packages = ${esp32c3.platform_packages}
board             = lolin_c3_mini
board_build.flash_mode  = dio
board_build.partitions  = min_spiffs.csv
build_unflags     = ${common.build_unflags}
  -D ARDUINO_USB_CDC_ON_BOOT=1
build_flags       = ${common.build_flags} ${esp32c3.build_flags}
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MODE=1
  -D USERMOD_ID_WORDCLOCK_8X8=98
  -D DATA_PINS=8

; ── 8×8 — ESP8266 D1 Mini ────────────────────────────────────────────────────
[env:wordclock8x8_esp8266]
board             = d1_mini
platform          = ${common.platform_wled_default}
platform_packages = ${common.platform_packages}
board_build.ldscript = ${common.ldscript_4m1m}
build_unflags     = ${common.build_unflags}
build_flags       = ${common.build_flags} ${esp8266.build_flags}
  -D USERMOD_ID_WORDCLOCK_8X8=98
  -D DATA_PINS=2
lib_deps          = ${esp8266.lib_deps}
