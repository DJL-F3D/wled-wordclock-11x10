; ============================================================
; platformio_override.ini — Word Clock custom build envs
;
; Syntax taken directly from WLED's own
; platformio_override.sample.ini so variable names are exact.
;
; This file is copied into the WLED source root by build.yml.
; WLED picks it up automatically alongside its platformio.ini.
;
; DATA_PINS — change the number to match your wiring:
;   ESP32-C3 default : 8  (GPIO8 on SuperMini / XIAO boards)
;   ESP8266  default : 2  (GPIO2 = D4 on Wemos D1 Mini)
; ============================================================

[platformio]
default_envs = wordclock_esp32c3, wordclock_esp8266

; ── ESP32-C3 ─────────────────────────────────────────────────────────────────
[env:wordclock_esp32c3]
extends          = esp32c3
platform         = ${esp32c3.platform}
platform_packages = ${esp32c3.platform_packages}
board            = esp32-c3-devkitm-1
build_unflags    = ${common.build_unflags}
build_flags      = ${common.build_flags} ${esp32c3.build_flags}
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PINS=8

; ── ESP8266 (Wemos D1 Mini / NodeMCU v2) ─────────────────────────────────────
[env:wordclock_esp8266]
board            = d1_mini
platform         = ${common.platform_wled_default}
platform_packages = ${common.platform_packages}
board_build.ldscript = ${common.ldscript_4m1m}
build_unflags    = ${common.build_unflags}
build_flags      = ${common.build_flags} ${esp8266.build_flags}
  -D USERMOD_ID_WORDCLOCK=99
  -D DATA_PINS=2
lib_deps         = ${esp8266.lib_deps}
